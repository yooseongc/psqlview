services:
  pg14:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports: ["54314:5432"]
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20

  pg15:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports: ["54315:5432"]
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20

  pg16:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports: ["54316:5432"]
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20

  pg17:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports: ["54317:5432"]
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 20

  # Cross-compile builder. Shares target/ with host through named volume so
  # rebuilds are incremental. Dist binary ends up at ./dist/psqlview on host.
  builder:
    image: rust:1.93-alpine
    working_dir: /src
    environment:
      CARGO_HOME: /cargo
      CARGO_TARGET_DIR: /target
      RUSTFLAGS: "-C target-feature=+crt-static"
    volumes:
      - ./:/src
      - cargo-cache:/cargo
      - target-cache:/target
      - ./dist:/dist
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
          set -eu
          apk add --no-cache musl-dev pkgconfig git ca-certificates >/dev/null
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl
          cp /target/x86_64-unknown-linux-musl/release/psqlview /dist/psqlview
          echo "built: /dist/psqlview"

  # Runner meant for cargo test against the pg* services inside the compose
  # network. Override PSQLVIEW_PG_URL to pick a version.
  tester:
    image: rust:1.93-alpine
    working_dir: /src
    environment:
      CARGO_HOME: /cargo
      CARGO_TARGET_DIR: /target
      RUSTFLAGS: "-C target-feature=+crt-static"
      PSQLVIEW_PG_URL: postgres://postgres:test@pg16:5432/postgres
    volumes:
      - ./:/src
      - cargo-cache:/cargo
      - target-cache:/target
    depends_on:
      pg14:
        condition: service_healthy
      pg15:
        condition: service_healthy
      pg16:
        condition: service_healthy
      pg17:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
          set -eu
          apk add --no-cache musl-dev pkgconfig git ca-certificates >/dev/null
          rustup target add x86_64-unknown-linux-musl
          cargo test --target x86_64-unknown-linux-musl -- --include-ignored

volumes:
  cargo-cache: {}
  target-cache: {}
